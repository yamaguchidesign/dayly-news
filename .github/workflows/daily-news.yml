name: Weekly Design & AI News

on:
  schedule:
    - cron: '0 23 * * 0,3'  # 月・木 8:00 JST (= 日・水 23:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install feedparser requests anthropic
      - name: Fetch, translate, and post news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/fetch_news.py
      - name: Commit and push article pages
        run: |
          git config user.name "dayly-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/articles/
          git diff --staged --quiet || git commit -m "chore: add article pages $(date +%Y-%m-%d)"
          git push
